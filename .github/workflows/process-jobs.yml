name: Process Payload Jobs

on:
  # Scheduled run disabled (D-: Neon compute fix). The Vercel cron in
  # vercel.json (*/30) is now the sole scheduler for /api/payload-jobs/run,
  # so this 5-minute schedule was waking Neon compute 24/7 and is turned off.
  # schedule:
  #   # Every 5 minutes — processes queued Shopier sync jobs
  #   - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Payload job runner
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://uygunayakkabi-store.vercel.app/api/payload-jobs/run" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Job runner returned non-200: $STATUS"
            exit 1
          fi
